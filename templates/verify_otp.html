<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seren · Verify OTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f8f7ff; --white:#fff; --blue:#4a6fd4; --pink:#d47898;
      --text:#1c1830; --muted:#7a718e; --border:#e4ddf5;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh; display:grid; place-items:center; padding:1.25rem;
      font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--text);
    }
    .auth-card {
      width:min(420px, 100%); background:var(--white); border:1px solid var(--border);
      border-radius:20px; padding:2rem; box-shadow:0 18px 50px rgba(74,111,212,0.12);
    }
    .brand { font-family:'DM Serif Display', serif; font-size:1.7rem; margin-bottom:0.5rem; }
    p { color:var(--muted); line-height:1.6; margin-bottom:1.5rem; }
    label { display:block; font-size:0.82rem; font-weight:700; margin-bottom:0.45rem; }
    input {
      width:100%; border:1.5px solid var(--border); border-radius:12px;
      padding:0.85rem 1rem; font:inherit; letter-spacing:0.18em; text-align:center;
      margin-bottom:1rem; outline:none;
    }
    input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(74,111,212,0.14); }
    button {
      width:100%; border:none; border-radius:12px; padding:0.9rem 1rem;
      background:linear-gradient(135deg, var(--blue), var(--pink)); color:white;
      font:inherit; font-weight:700; cursor:pointer;
    }
    .flash { margin-bottom:1rem; padding:0.75rem 0.9rem; border-radius:12px; background:#fdf0f5; color:#b0527a; }
    .back { display:block; text-align:center; margin-top:1rem; color:var(--muted); text-decoration:none; }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="brand">Verify OTP</div>
    <p>Enter the 6-digit OTP sent to {{ phone }}.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('verify_otp') }}">
      <label for="otp">OTP</label>
      <input id="otp" name="otp" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" required>
      <button type="submit">Verify and Continue</button>
    </form>
    <a class="back" href="{{ url_for('login') }}">Use another email or phone</a>
  </main>
</body>
</html>
