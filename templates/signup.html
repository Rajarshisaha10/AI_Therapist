<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seren · Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f8f7ff; --white:#fff; --blue:#4a6fd4; --pink:#d47898;
      --text:#1c1830; --muted:#7a718e; --border:#e4ddf5;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh; display:grid; place-items:center; padding:1.25rem;
      font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--text);
    }
    .auth-card {
      width:min(440px, 100%); background:var(--white); border:1px solid var(--border);
      border-radius:20px; padding:2rem; box-shadow:0 18px 50px rgba(74,111,212,0.12);
    }
    .brand {
      font-family:'DM Serif Display', serif; font-size:1.7rem; margin-bottom:0.5rem;
    }
    p { color:var(--muted); line-height:1.6; margin-bottom:1.5rem; }
    label { display:block; font-size:0.82rem; font-weight:700; margin-bottom:0.45rem; }
    input {
      width:100%; border:1.5px solid var(--border); border-radius:12px;
      padding:0.85rem 1rem; font:inherit; margin-bottom:1rem; outline:none;
    }
    input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(74,111,212,0.14); }
    button {
      width:100%; border:none; border-radius:12px; padding:0.9rem 1rem;
      background:linear-gradient(135deg, var(--blue), var(--pink)); color:white;
      font:inherit; font-weight:700; cursor:pointer;
    }
    .flash { margin-bottom:1rem; padding:0.75rem 0.9rem; border-radius:12px; background:#eef2fd; color:#2e4fa3; }
    .back { display:block; text-align:center; margin-top:1rem; color:var(--muted); text-decoration:none; }
    .switch { display:block; text-align:center; margin-top:0.75rem; font-size:0.85rem; color:var(--muted); }
    .switch a { color:var(--blue); text-decoration:none; font-weight:600; }
    .switch a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="brand">Seren</div>
    <p>Create your account to start your wellness journey.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('signup') }}">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ email or '' }}" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="At least 8 characters" required>

      <label for="confirm_password">Confirm Password</label>
      <input id="confirm_password" name="confirm_password" type="password" placeholder="Re-enter your password" required>

      <button type="submit">Create Account</button>
    </form>
    <span class="switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></span>
    <a class="back" href="{{ url_for('home') }}">Back to home</a>
  </main>
</body>
</html>
