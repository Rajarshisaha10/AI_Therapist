services:
  - type: web
    name: ai-therapist
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_HISTORY_MESSAGES
        value: "10"
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
